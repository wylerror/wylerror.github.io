<!doctype html>
<html>
    <head>
        <script>
            function ChangeSoftware(innerHTML)
            {
                document.getElementById('software').innerHTML = innerHTML
            }
            function Help()
            {
                document.getElementById('software').innerHTML = '<h1>Help</h1><div>Click the icon to open the software.<br />Help: Show this message.<br />Terminal: Open the terminal.<br />GitHub: Open the GitHub website.<br />VSCode: Open the Visual Studio Code website.</div>'
            }
            function Open(url)
            {
                window.open(`https://${url}`)
            }
            function Terminal()
            {
                document.getElementById('software').innerHTML = '<h1>Terminal</h1><div style="color: green; text-align: left;">Input: <input id="input" style="background: black; border-radius: 10px; color: green; width: calc(100% - 8vh);" /><div id="output"></div></div>'
                document.getElementById('input').addEventListener('keydown', function(event)
                {
                    if (event.key === 'Enter')
                    {
                        document.getElementById('output').innerHTML += `Terminal $ ${document.getElementById('input').value}<br />`
                        switch (document.getElementById('input').value)
                        {
                            case 'bing':
                                Open('www.bing.com')
                                break
                            case 'clear':
                                document.getElementById('output').innerHTML = ''
                                break
                            case 'code':
                                Open('https://vscode.dev')
                                break
                            case 'exit':
                                document.getElementById('software').innerHTML = ''
                                break
                            case 'github':
                                Open('https://github.com')
                                break
                            case 'help':
                                document.getElementById('output').innerHTML += 'bing: Open Microsoft Bing<br />clear: Clear the terminal<br />code: Open Visual Studio Code<br />exit: Exit the terminal<br />github: Open GitHub<br />help: Show this message<br />time: Show the current time<br />version: Show the version of the OS<br />'
                                break
                            case 'time':
                                document.getElementById('output').innerHTML += `${document.getElementById('time').innerHTML}<br />`
                                break
                            case 'version':
                                document.getElementById('output').innerHTML += '&Alpha;&Omega; OS Version &Alpha;&alpha;<br />'
                        }
                        document.getElementById('input').value = ''
                    }
                })
            }
            function Time()
            {
                const time = new Date();
                document.getElementById('time').innerHTML = `${time.getHours().toString().padStart(2, '0')}:${time.getMinutes().toString().padStart(2, '0')}:${time.getSeconds().toString().padStart(2, '0')}`
            }
            setInterval(Time, 1000);
        </script>
        <style>
            @keyframes preview
            {
                0%
                {
                    color: black;
                }
                50%
                {
                    color: white;
                }
                100%
                {
                    color: black;
                }
            }
            #desktop
            {
                color: white;
            }
            #help
            {
                color: red;
            }
            #terminal
            {
                color: blue;
            }
            #time
            {
                font-size: 16px;
            }
            #title
            {
                display: inline-block;
                width: calc(100% - 11vh);
            }
            .icon
            {
                background: white;
                border-radius: 10px;
                display: inline-block;
                width: 12.5%;
            }
                .icon:hover
                {
                    text-decoration: underline black;
                    width: 25%;
                }
            body
            {
                background: black;
            }
            #github, #microsoftbing, #visualstudiocode
            {
                color: black;
            }
                #github:hover, #microsoftbing:hover, #visualstudiocode:hover
                {
                    animation: preview 1s ease-in-out;
                }
            #desktop, .icon
            {
                text-align: center;
            }
            *
            {
                font-family: Consolas, monospace;
            }
        </style>
        <title>
            &Alpha;&Omega; OS
        </title>
    </head>
    <body>
        <div id='desktop'>
            <div>
                <span>&Alpha;&alpha;</span>
                <h1 id='title'>
                    &ensp;&ensp;&ensp;&Alpha;&Omega; OS
                </h1>
                <span id='time'>00:00:00</span>
            </div>
            <div class='icon' id='help' onclick='Help()'>
                <br />
                Help
                <h1>
                    ?
                </h1>
                <br />
            </div>
            <div class='icon' id='terminal' onclick='Terminal()'>
                <br />
                Terminal
                <h1>
                    $
                </h1>
                <br />
            </div>
            <div class='icon' id='microsoftbing' onclick='Open("www.bing.com")' onmouseover='ChangeSoftware("<h1>Microsoft Bing</h1>Click to open the Microsoft Bing website.")' onmouseout='ChangeSoftware("")'>
                <br />
                MSBing
                <h1>
                    Bing
                </h1>
                <br />
            </div>
                <div class='icon' id='github' onclick='Open("github.com")' onmouseover='ChangeSoftware("<h1>GitHub</h1>Click to open the GitHub website.")' onmouseout='ChangeSoftware("")'>
                <br />
                GitHub
                <h1>
                    GitHub
                </h1>
                <br />
            </div>
            <div class='icon' id='visualstudiocode' onclick='Open("vscode.dev")' onmouseover='ChangeSoftware("<h1>Visual Studio Code</h1>Click to open the Visual Studio Code website.")' onmouseout='ChangeSoftware("")'>
                <br />
                VSCode
                <h1>
                    &lt;/&gt;
                </h1>
                <br />
            </div>
            <div id='software'></div>
        </div>
    </body>
</html>
