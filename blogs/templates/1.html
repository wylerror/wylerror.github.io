<!doctype html>
<html lang='en'>
    <head>
        <meta name='viewport' content='width=device-width, initial-scale=1' />
        <style>
            #center
            {
                background: radial-gradient(deepskyblue,cyan);
                border-radius: 0;
                margin: 0 auto;
                width: 60%;
            }
            #index
            {
                float: left;
            }
            #other-blogs
            {
                float: right;
            }
            #text
            {
                margin: auto;
                overflow-y: scroll;
                width: 75%;
            }
            body
            {
                background: cyan;
            }
            h2
            {
                color: steelblue;
            }
            #index, #other-blogs
            {
                width: 18%;
            }
            div, nav
            {
                background: white;
                border-radius: 25px;
                height: 715px;
                overflow: hidden;
                text-align: center;
            }
                div:hover, nav:hover
                {
                    background: deepskyblue;
                    transition: background .25s ease-in;
                }
        </style>
        <title>
            Blog | 
        </title>
    </head>
    <body>
        <nav id='index'>
            <h2>
                Index
            </h2>
        </nav>
        <nav id='other-blogs'>
            <h2>
                Other Blogs
            </h2>
        </nav>
        <div id='center'>
            <h2>
                Blog Title
            </h2>
            <div id='text'>
                Blog Text
            </div>
        </div>
    </body>
</html>
