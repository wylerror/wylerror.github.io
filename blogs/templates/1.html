<!doctype html>
<html>
    <head>
        <style>
            #center
            {
                background: radial-gradient(deepskyblue,cyan);
                border-radius: 0;
                margin: 0 auto;
                width: 60%;
            }
            #index
            {
                float: left;
            }
            #other-blogs
            {
                float: right;
            }
            #text
            {
                margin: auto;
                overflow-y: scroll;
                width: 75%;
            }
            body
            {
                background: cyan;
            }
            div
            {
                background: white;
                border-radius: 25px;
                height: 715px;
                overflow: hidden;
                text-align: center;
            }
                div:hover
                {
                    background: deepskyblue;
                    transition: background .25s ease-in;
                }
            h2
            {
                color: steelblue;
            }
            #index, #other-blogs
            {
                width: 18%;
            }
        </style>
        <title>
            Blog | 
        </title>
    </head>
    <body>
        <div id='index'>
            <h2>
                Index
            </h2>
        </div>
        <div id='other-blogs'>
            <h2>
                Other Blogs
            </h2>
        </div>
        <div id='center'>
            <h2>
                Blog Title
            </h2>
            <div id='text'>
                Blog Text
            </div>
        </div>
    </body>
</html>
