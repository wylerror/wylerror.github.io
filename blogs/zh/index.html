<!doctype html>
<html lang='zh'>
    <head>
        <meta name='viewport' content='width=device-width, initial-scale=1' />
        <style>
            #box
            {
                align-items: stretch;
            }
            #index
            {
                width: 77.5%;
            }
            #null-column
            {
                width: 2.5%;
            }
            #null-row
            {
                margin-top: 40px;
            }
            #profile
            {
                text-align: center;
                width: 20%;
            }
            h2
            {
                margin-bottom: 125px;
                margin-top: 60px;
            }
            img
            {
                border-radius: 50%;
                margin-top: 125px;
                width: 80%;
            }
            #box, #index
            {
                display: flex;
            }
            #box, #null-column, body
            {
                background: grey;
            }
            div, nav
            {
                background: white;
                border-radius: 10px;
                margin-bottom: 25px;
                margin-top: 25px;
            }
            h1, h2, span
            {
                color: deepskyblue;
            }
        </style>
        <title>
            博客
        </title>
    </head>
    <body>
        <div id='box'>
            <div id='profile'>
                <img alt='头像' id='icon' src='../../images/avatar.jpg' />
                <div id='null-row'></div>
                <span>
                    wylerror
                </span>
                <h2>
                    wylerror 的博客
                </h2>
            </div>
            <div id='null-column'></div>
            <nav id="index">
                <ul>
                    <li>
                        <h2>
                            <a href="../GitHub Pages" target="_blank">GitHub Pages</a>
                        </h2>
                    </li>
                </ul>
            </nav>
        </div>
    </body>
</html>
