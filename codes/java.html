<!doctype html>
<html>
<head>
    <style>
        @keyframes content-slide-in
        {
            from
            {
                width: 0;
            }
            to
            {
                width: 41ch;
            }
        }
        @keyframes sprinkle-bling
        {
            from
            {
                border-right: 1px solid transparent;
            }
            to
            {
                border-right: 1px solid #000;
            }
        }
        *
        {
            font-family: Consolas;
            margin: 0;
            padding: 0;
        }
        .container
        {
            background-color: #fff;
            height: 100vh;
        }
        .content
        {
            animation: content-slide-in 3s steps(41) forwards;
            overflow: hidden;
            position: relative;
            white-space: nowrap;
        }
            .content::after
            {
                content: '';
                height: 16px;
                position: absolute;
                right: 0;
                animation: sprinkle-bling .5s steps(2) infinite;
            }
        .flex
        {
            align-items: center;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container flex">
        <div class="content">
            <pre>
public class HelloWorld
{
    public static void main(String[]args)
    {
        System.out.print("Hello world!");
    }
}
            </pre>
        </div>
    </div>
</body>
</html>
