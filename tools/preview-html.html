<!doctype html>
<html lang='en'>
    <head>
        <meta name='viewport' content='width=device-width, initial-scale=1' />
        <script>
            function Preview()
            {
                document.getElementById('output').srcdoc = document.getElementById('input').value
            }
        </script>
        <style>
            #input
            {
                height: 17.5px;
                resize: vertical;
                width: 95%;
            }
            #input-area
            {
                margin: 10px 10px 10px 10px;
            }
            #output
            {
                height: 720px;
                width: 100%;
            }
            #submit
            {
                float: right;
            }
            body
            {
                background: aqua;
            }
            h1
            {
                text-align: center;
            }
        </style>
        <title>
            Tool | Preview HTML
        </title>
    </head>
    <body>
        <h1>
            Preview HTML
        </h1>
        <div id='input-area'>
            <textarea id='input'><!--
Input your HTML code
Help: Use <a href='https://wylerror.github.io'>Main Website</a> to preview my website
--></textarea>
            <input id='submit' onclick='Preview()' type='submit' value='Preview' />
        </div>
        <div>
            <iframe id='output' srcdoc='<!doctype html><html><head></head><body>Hello world!</body></html>'></iframe>
        </div>
    </body>
</html>
