<!doctype html>
<html>
    <head>
        <script>
            function SendEmail()
            {
                window.location.href = 'mailto:' + document.getElementById('input').value
            }
        </script>
        <style>
            body
            {
                background: #7f00ff;
                text-align: center;
            }
        </style>
        <title>
            Tool | Send Email
        </title>
    </head>
    <body>
        <h1>
            Send Email
        </h1>
        <input id='input' />
        <input onclick='SendEmail()' type='submit' value='Send' />
    </body>
</html>
